version: "3.9"

services:
  backend:
    build: ./backend
    container_name: scheduler_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Store the SQLite file on a named volume so it survives docker-compose --build
      - DATABASE_URL=sqlite:////data/scheduler.db
    volumes:
      - ./backend:/app          # live-reload source
      - scheduler_db:/data      # ← persistent DB volume, never wiped by rebuilds
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: scheduler_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  scheduler_db:   # named volume — Docker manages it, never deleted on rebuild
