version: "3.9"

services:
  backend:
    build: ./backend
    container_name: scheduler_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # sqlite:///  = relative,  sqlite:////  = absolute with leading /
      # /data/scheduler.db is an absolute path, so we need exactly 4 slashes total:
      #   sqlite:// + //data/scheduler.db  = sqlite:////data/scheduler.db  ✓
      - DATABASE_URL=sqlite:////data/scheduler.db
    volumes:
      - ./backend:/app          # live-reload source code
      - scheduler_db:/data      # persistent DB — survives docker-compose --build
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: scheduler_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  scheduler_db:   # named volume — Docker manages it, never deleted on rebuild
